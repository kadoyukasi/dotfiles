personality = "pragmatic"
model = "gpt-5.6-sol"
model_reasoning_effort = "medium"

[plugins."github@openai-curated"]
enabled = true

[plugins."documents@openai-primary-runtime"]
enabled = true

[plugins."spreadsheets@openai-primary-runtime"]
enabled = true

[plugins."presentations@openai-primary-runtime"]
enabled = true

[plugins."browser@openai-bundled"]
enabled = true

[plugins."context-mode@context-mode"]
enabled = true

[mcp_servers.serena]
startup_timeout_sec = 15
command = "serena"
args = ["start-mcp-server", "--project-from-cwd", "--context=codex"]

[features]
memories = true
plugin_hooks = true
hooks = true

[desktop]
git-commit-instructions = """
---
name: conventional-commit
description: 'Prompt and workflow for generating conventional commit messages using a structured XML format. Guides users to create standardized, descriptive commit messages in line with the Conventional Commits specification, including instructions, examples, and validation.'
---

### Instructions

```xml
\t<description>This file contains a prompt template for generating conventional commit messages. It provides instructions, examples, and formatting guidelines to help users write standardized, descriptive commit messages in accordance with the Conventional Commits specification.</description>
```

### Workflow

**Follow these steps:**

1. Run `git status` to review changed files.
2. Run `git diff` or `git diff --cached` to inspect changes.
3. Stage your changes with `git add <file>`.
4. Construct your commit message using the following XML structure.
5. After generating your commit message, Copilot will automatically run the following command in your integrated terminal (no confirmation needed):

```bash
git commit -m "type(scope): description"
```

6. Just execute this prompt and Copilot will handle the commit for you in the terminal.

### Commit Message Structure

```xml
<commit-message>
\t<type>feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert</type>
\t<scope>()</scope>
\t<description>A short, imperative summary of the change</description>
\t<body>(optional: more detailed explanation)</body>
\t<footer>(optional: e.g. BREAKING CHANGE: details, or issue references)</footer>
</commit-message>
```

### Examples

```xml
<examples>
\t<example>feat(parser): add ability to parse arrays</example>
\t<example>fix(ui): correct button alignment</example>
\t<example>docs: update README with usage instructions</example>
\t<example>refactor: improve performance of data processing</example>
\t<example>chore: update dependencies</example>
\t<example>feat!: send email on registration (BREAKING CHANGE: email service required)</example>
</examples>
```

### Validation

```xml
<validation>
\t<type>Must be one of the allowed types. See <reference>https://www.conventionalcommits.org/en/v1.0.0/#specification</reference></type>
\t<scope>Optional, but recommended for clarity.</scope>
\t<description>Required. Use the imperative mood (e.g., "add", not "added").</description>
\t<body>Optional. Use for additional context.</body>
\t<footer>Use for breaking changes or issue references.</footer>
</validation>
```

### Final Step

```xml
<final-step>
\t<cmd>git commit -m "type(scope): description"</cmd>
\t<note>Replace with your constructed message. Include body and footer if needed.</note>
</final-step>
```"""
